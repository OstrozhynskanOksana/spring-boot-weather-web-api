version: "3.8"

services:

  db:
    image: postgres:16
    container_name: weather-db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 529634087pog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: weather-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: 529634087pog
      JWT_SECRET: S4PPQo9diiW9AUf9yzg5z9zcqixPmyLIwCXaWJK2cn5XfOm8aJvEalktxrOcxWiv
      JWT_EXPIRATION: 24

volumes:
  pgdata: